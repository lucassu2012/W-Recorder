name: Build WRecorder EXE

# 触发条件：
# - push 到 main/master：自动编译，产物可在 Actions 页面下载
# - 打 tag (v*)：编译并自动创建 Release，附带打包好的 zip
# - 手动触发：Actions 页面点 "Run workflow"
on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write   # 打 tag 时创建 Release 需要

jobs:
  build:
    runs-on: windows-latest   # 必须 Windows：依赖 pywin32 + Win32 API

    defaults:
      run:
        shell: pwsh

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 安装依赖 + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: 打包 EXE
        run: pyinstaller WRecorder.spec --noconfirm

      - name: 组装分发包（EXE + 控制脚本 + 配置示例）
        run: |
          New-Item -ItemType Directory -Force -Path bundle | Out-Null
          Copy-Item dist/WRecorder.exe        bundle/
          Copy-Item start.bat                 bundle/
          Copy-Item stop.bat                  bundle/
          Copy-Item install_autostart.bat     bundle/
          Copy-Item uninstall_autostart.bat   bundle/
          Copy-Item config.sample.json        bundle/
          Copy-Item README.md                 bundle/
          Write-Host "分发包内容："
          Get-ChildItem bundle | Format-Table Name, Length

      - name: 上传产物（Actions 页面可下载）
        uses: actions/upload-artifact@v4
        with:
          name: WRecorder-windows
          path: bundle/**
          if-no-files-found: error

      # ---------- 仅打 tag 时：创建 Release ----------
      - name: 打 Release zip
        if: startsWith(github.ref, 'refs/tags/')
        run: Compress-Archive -Path bundle/* -DestinationPath "WRecorder-${{ github.ref_name }}.zip" -Force

      - name: 创建 GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: WRecorder-${{ github.ref_name }}.zip
          generate_release_notes: true
